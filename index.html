<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Брови | Ламінування вій</title>

<style>
body {
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:#0b0b0c;
    color:#fff;
}

.container {
    padding:16px;
    max-width:480px;
    margin:auto;
}

/* HEADER */
.header {
    text-align:center;
    margin-bottom:20px;
}

.header h1 {
    margin:0;
    font-size:18px;
}

.header p {
    color:#aaa;
    font-size:12px;
}

/* HERO */
.hero {
    border-radius:24px;
    height:260px;
    background:
    linear-gradient(to top, rgba(0,0,0,0.8), transparent),
    url("https://images.unsplash.com/photo-1620331311520-246422fd82f9?q=80&w=1400&auto=format&fit=crop");
    background-size:cover;
    background-position:center;
    padding:16px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
}

.hero h2 {
    margin:0;
    font-size:26px;
}

.hero p {
    font-size:13px;
    color:#ddd;
}

/* BUTTON */
.btn {
    margin-top:12px;
    background:linear-gradient(90deg,#ff4fa3,#ff9ac6);
    border:none;
    padding:14px;
    width:100%;
    border-radius:16px;
    color:white;
    font-weight:600;
}

/* GRID */
.grid {
    margin-top:16px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.card {
    height:180px;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    background-size:cover;
    background-position:center;
}

.card::after {
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.card-content {
    position:absolute;
    bottom:10px;
    left:10px;
    right:10px;
    z-index:2;
}

.card h3 {
    margin:0;
    font-size:16px;
}

.card p {
    margin:5px 0 0;
    font-size:12px;
    color:#ccc;
}

/* КАРТИНКИ */
.portfolio {
background-image:url("https://images.unsplash.com/photo-1596462502278-27bfdc403348?q=80&w=1200&auto=format&fit=crop");
}

.reviews {
background-image:url("https://images.unsplash.com/photo-1583001809873-a128495da465?q=80&w=1200&auto=format&fit=crop");
}

.contacts {
background-image:url("https://images.unsplash.com/photo-1604654894610-df63bc536371?q=80&w=1200&auto=format&fit=crop");
}

.course {
background-image:url("https://images.unsplash.com/photo-1607746882042-944635dfe10e?q=80&w=1200&auto=format&fit=crop");
}

.booking {
background-image:url("https://images.unsplash.com/photo-1616683693504-3ea7e9ad6fec?q=80&w=1200&auto=format&fit=crop");
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Брови | Ламінування вій</h1>
<p>beauty webapp</p>
</div>

<!-- HERO -->
<div class="hero">
<h2>Запис на процедуру</h2>
<p>Обери послугу, дату та час</p>
</div>

<button class="btn" onclick="send('booking')">
🌸 Почати запис
</button>

<!-- GRID -->
<div class="grid">

<div class="card portfolio" onclick="send('portfolio')">
<div class="card-content">
<h3>Портфоліо</h3>
<p>Реальні брови</p>
</div>
</div>

<div class="card reviews" onclick="send('reviews')">
<div class="card-content">
<h3>Відгуки</h3>
<p>Емоції клієнтів</p>
</div>
</div>

<div class="card contacts" onclick="send('contacts')">
<div class="card-content">
<h3>Контакти</h3>
<p>Зв'язок з майстром</p>
</div>
</div>

<div class="card course" onclick="send('course')">
<div class="card-content">
<h3>Курс</h3>
<p>Навчання бровам</p>
</div>
</div>

<div class="card booking" onclick="send('my')">
<div class="card-content">
<h3>Мій запис</h3>
<p>Перевірити запис</p>
</div>
</div>

</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function send(action){
    tg.sendData(action);
}
</script>

</body>
</html>
